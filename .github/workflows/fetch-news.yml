# .github/workflows/fetch-news.yml
# Runs every night at 1:00 AM IST (7:30 PM UTC — IST is UTC+5:30)
# Fetches news from Marketaux and caches in Supabase

name: Fetch News Cache

on:
  schedule:
    - cron: "30 19 * * *"   # 7:30 PM UTC = 1:00 AM IST
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run news fetcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node fetch-news.js
