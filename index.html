<style>
  :root{
    --bg:#0d1117;
    --surface:#161b22;
    --surface-2:#1c2230;
    --border:#2a3344;
    --text:#e8ecf0;
    --muted:#7d8fa8;
    --muted-2:#4a5568;
    --bull:#00d68f;
    --bull-soft:rgba(0,214,143,.13);
    --bear:#ff5370;
    --bear-soft:rgba(255,83,112,.13);
    --ob:#f0b94d;
    --ob-soft:rgba(240,185,77,.13);
    --fvg:#a78bfa;
    --fvg-soft:rgba(167,139,250,.13);
    --accent:#00d68f;
  }
  body.light-mode{
    --bg:#ffffff;
    --surface:#f4f6f9;
    --surface-2:#e9ecf1;
    --border:#d1d9e0;
    --text:#0d1117;
    --muted:#4a5568;
    --muted-2:#8a9ab0;
    --bull:#009e68;
    --bull-soft:rgba(0,158,104,.1);
    --bear:#d63a54;
    --bear-soft:rgba(214,58,84,.1);
    --ob:#b8860b;
    --ob-soft:rgba(184,134,11,.1);
    --fvg:#6d4ec2;
    --fvg-soft:rgba(109,78,194,.1);
  }
  body.light-mode #topbar{background:rgba(255,255,255,0.97);border-bottom-color:#d1d9e0;}
  body.light-mode #ticker-wrap{border-bottom-color:#d1d9e0;}
  body.light-mode #desktop-search{background:#f4f6f9;border-color:#d1d9e0;color:#0d1117;}
  body.light-mode #desktop-search::placeholder{color:#8a9ab0;}
  body.light-mode #search-dropdown{background:#f4f6f9;border-color:#d1d9e0;}
  body.light-mode .sd-row:hover{background:#e9ecf1;}
  body.light-mode .sd-sym{color:#0d1117;}
  body.light-mode #logo-name{color:#0d1117;}
  body.light-mode #mobile-search-btn{background:#f4f6f9;border-color:#d1d9e0;color:#4a5568;}
  body.light-mode #nav-links a:hover{background:#e9ecf1;}
  body.light-mode #mobile-nav-strip{border-bottom-color:#d1d9e0;}
  body.light-mode #mobile-nav-strip a{background:#f4f6f9;border-color:#d1d9e0;color:#4a5568;}
  body.light-mode .tab-bar{background:#f4f6f9;border-top-color:#d1d9e0;}
  body.light-mode #warning-bar{background:#fff0f2;border-color:#fca5a5;}
  #theme-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;transition:border-color .2s,color .2s;}
  #theme-toggle:hover{border-color:var(--muted);color:var(--text);}
  @media(max-width:900px){
    #theme-toggle{padding:7px;border-radius:50%;width:34px;height:34px;justify-content:center;}
    #theme-toggle #theme-label{display:none;}
    #theme-icon{font-size:15px;}
  }
  #warning-bar{background:#1a0508;border-bottom:1px solid rgba(255,83,112,.3);padding:7px 16px;text-align:center;font-family:'Inter',sans-serif;font-size:11.5px;color:#ff5370;font-weight:500;letter-spacing:0.01em;transition:background .2s;}

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  ::selection{background:var(--bull);color:#001a10;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:#2a3344;border-radius:8px;}
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'JetBrains Mono',monospace;}

  /* ticker */
  .ticker-track{display:flex;width:max-content;animation:scrollX 180s linear infinite;}
  .ticker-track:hover{animation-play-state:paused;}
  @keyframes scrollX{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .ticker-item{display:flex;align-items:center;gap:8px;padding:0 20px;border-right:1px solid var(--border);white-space:nowrap;}

  /* hero candles */
  .candle-rise{transform-origin:bottom;animation:riseUp .9s cubic-bezier(.2,.9,.25,1) both;}
  @keyframes riseUp{0%{transform:scaleY(0);opacity:0;}100%{transform:scaleY(1);opacity:1;}}
  .scan-line{animation:sweep 3.6s ease-in-out infinite;}
  @keyframes sweep{0%{transform:translateX(0);opacity:0;}8%{opacity:1;}50%{transform:translateX(560px);opacity:1;}58%{opacity:0;}100%{transform:translateX(560px);opacity:0;}}
  .pulse-dot{animation:pulseDot 1.8s ease-in-out infinite;}
  @keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(0,214,143,.6);}50%{box-shadow:0 0 0 8px rgba(0,214,143,0);}}
  .pulse-dot-bear{animation:pulseDotBear 1.8s ease-in-out infinite;}
  @keyframes pulseDotBear{0%,100%{box-shadow:0 0 0 0 rgba(255,83,112,.55);}50%{box-shadow:0 0 0 8px rgba(255,83,112,0);}}
  .float-1{animation:float1 6s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

  .fade-up{animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .badge-buy{background:var(--bull-soft);color:var(--bull);border:1px solid rgba(0,214,143,.3);}
  .badge-sell{background:var(--bear-soft);color:var(--bear);border:1px solid rgba(255,83,112,.3);}
  .badge-ob{background:var(--ob-soft);color:var(--ob);border:1px solid rgba(240,185,77,.3);}
  .badge-fvg{background:var(--fvg-soft);color:var(--fvg);border:1px solid rgba(167,139,250,.3);}

  .skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,#253047 37%,var(--surface-2) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  .scrollbar-thin::-webkit-scrollbar{height:6px;width:6px;}

  input[type=text]:focus{outline:none;}

  /* glow card hover */
  .signal-card{position:relative;transition:transform .2s,border-color .2s;}
  .signal-card:hover{transform:translateY(-2px);border-color:rgba(0,214,143,.35)!important;}

  /* mobile search overlay */
  .search-overlay{position:fixed;inset:0;background:rgba(13,17,23,.96);z-index:100;display:flex;flex-direction:column;padding:16px;}
  .search-overlay input{font-size:18px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;width:100%;}
  .search-overlay input:focus{outline:none;border-color:var(--bull);}

  /* row highlight */
  .stock-row{transition:background .15s;}
  .stock-row:active{background:var(--surface-2);}

  /* tab bar mobile */
  .tab-bar{display:none;}
  @media(max-width:768px){
    .tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:40;padding-bottom:env(safe-area-inset-bottom);}
    .tab-bar a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;font-size:10px;color:var(--muted);text-decoration:none;transition:color .2s;}
    .tab-bar a.active, .tab-bar a:active{color:var(--bull);}
    .tab-bar svg{width:20px;height:20px;}
    body{padding-bottom:64px;}
  }

  /* News modal */
  .news-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;justify-content:center;}
  @media(min-width:640px){.news-modal{align-items:center;}}
  .news-modal-inner{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:24px 20px;}
  @media(min-width:640px){.news-modal-inner{border-radius:20px;margin:16px;}}
  .news-card{cursor:pointer;transition:transform .18s,border-color .18s;}
  .news-card:hover{transform:translateY(-2px);border-color:rgba(0,214,143,.3)!important;}
  /* hide how-it-works on mobile */
  @media(max-width:767px){.how-it-works-section{display:none!important;}}

  /* AdSense — hide wrapper when ad hasn't rendered */
  .adsense-wrap{overflow:hidden;transition:all .3s;}
  .adsense-wrap:empty{display:none!important;}
  .adsense-wrap ins.adsbygoogle[data-ad-status="unfilled"]{display:none!important;}
  .adsense-wrap:has(ins[data-ad-status="unfilled"]){display:none!important;}
  /* Leaderboard (728×90 desktop / 320×50 mobile) */
  .ad-leaderboard{width:100%;text-align:center;padding:6px 0;}
  /* In-content rectangle (336×280) */
  .ad-rectangle{width:100%;text-align:center;padding:4px 0;}
  /* In-feed / native */
  .ad-infeed{width:100%;text-align:center;padding:4px 0;}

  /* ── Moneycontrol-style news hub ── */
  .news-cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;}
  .news-cat-tabs::-webkit-scrollbar{display:none;}
  .news-cat-tab{flex:0 0 auto;padding:7px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s;}
  .news-cat-tab:hover{color:var(--text);}
  .news-row{padding:11px 4px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
  .news-row:last-child{border-bottom:none;}
  .news-row:hover{background:var(--surface-2);}
  .news-row-thumb{width:78px;height:58px;flex-shrink:0;border-radius:10px;overflow:hidden;background:var(--surface-2);}
  .news-row-thumb img{width:100%;height:100%;object-fit:cover;}
  .news-block{border-radius:18px;padding:16px;margin-bottom:18px;}
  .news-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}

  /* compact stock-specific news strip under chart */
  .stock-news-strip{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
  .stock-news-item{display:flex;align-items:flex-start;gap:10px;padding:9px 2px;cursor:pointer;border-radius:10px;transition:background .15s;}
  .stock-news-item:hover{background:var(--surface-2);}

  /* ── FIXED TOP BAR (outside React) ── */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(13,17,23,0.97);border-bottom:1px solid #2a3344;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  #ticker-wrap{overflow:hidden;border-bottom:1px solid #2a3344;}
  #navbar{max-width:1320px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:10px;}
  #nav-links{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  #nav-links a{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;padding:7px 12px;border-radius:8px;transition:color .15s,background .15s;white-space:nowrap;}
  #nav-links a:hover{color:var(--text);background:var(--surface-2);}
  @media(max-width:900px){#nav-links{display:none;}}

  /* mobile-only quick-jump nav strip, shown under the topbar */
  #mobile-nav-strip{display:none;}
  @media(max-width:900px){
    #mobile-nav-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 12px 10px;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
    #mobile-nav-strip::-webkit-scrollbar{display:none;}
    #mobile-nav-strip a{flex:0 0 auto;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);white-space:nowrap;}
    #mobile-nav-strip a:active{color:var(--bull);border-color:rgba(0,214,143,.4);}
  }
  #logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;}
  #logo-icon{width:32px;height:32px;border-radius:8px;background:rgba(0,214,143,0.15);border:1px solid rgba(0,214,143,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#e8ecf0;line-height:1;text-align:left;}
  #logo-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:#7d8fa8;margin-top:3px;line-height:1;text-align:left;}
  #search-wrap{flex:1;max-width:420px;position:relative;}
  #desktop-search{width:100%;background:#161b22;border:1px solid #2a3344;border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:#e8ecf0;font-family:'Inter',sans-serif;}
  #desktop-search:focus{outline:none;border-color:#00d68f;}
  #desktop-search::placeholder{color:#7d8fa8;}
  #search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;}
  #scan-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#7d8fa8;white-space:nowrap;margin-left:auto;flex-shrink:0;}
  #scan-dot{width:8px;height:8px;border-radius:50%;background:#00d68f;}
  #mobile-search-btn{display:none;flex:1;align-items:center;gap:8px;background:#161b22;border:1px solid #2a3344;border-radius:8px;padding:9px 12px;font-size:13px;color:#7d8fa8;font-family:'Inter',sans-serif;cursor:pointer;}
  #search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#161b22;border:1px solid #2a3344;border-radius:8px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:60;display:none;}
  #search-dropdown.open{display:block;}
  .sd-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:none;border:none;border-bottom:1px solid #2a3344;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;}
  .sd-row:last-child{border-bottom:none;}
  .sd-row:hover{background:#1c2230;}
  .sd-sym{font-family:'JetBrains Mono',monospace;font-size:13px;color:#e8ecf0;font-weight:600;}
  .sd-name{font-size:11px;color:#7d8fa8;margin-top:2px;}
  .sd-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
  .sd-price{font-family:'JetBrains Mono',monospace;font-size:12px;color:#7d8fa8;}
  #page-content{padding-top:88px;}
  @media(max-width:640px){
    #search-wrap{display:none;}
    #scan-status{display:none;}
    #mobile-search-btn{display:flex;}
    #navbar{padding:8px 12px;gap:8px;}
    #page-content{padding-top:76px;}
  }
</style>
</head>

/* ============================== SEEDED RNG (fallback only) ============================== */
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return ()=>{h=Math.imul(h^h>>>16,2246822519);h=Math.imul(h^h>>>13,3266489917);h=(h^=h>>>16)>>>0;return h;};}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}

function genCandlesFake(symbol, n=160){
  const seedFn = hashStr(symbol);
  const rand = mulberry32(seedFn());
  let base = 80 + rand()*3200;
  const candles = [];
  let trendBias = (rand()-0.5)*0.012;
  let price = base;
  const today = new Date();
  for(let i=n-1;i>=0;i--){
    if(i % 18 === 0) trendBias = (rand()-0.5)*0.014;
    const vol = 0.012 + rand()*0.018;
    const drift = trendBias + (rand()-0.5)*vol;
    const open = price;
    let close = open*(1+drift);
    if(close<=0) close = open*1.001;
    const wickUp = Math.abs((rand())*vol*0.9)*open;
    const wickDown = Math.abs((rand())*vol*0.9)*open;
    const high = Math.max(open,close)+wickUp;
    const low = Math.max(0.5, Math.min(open,close)-wickDown);
    const date = new Date(today); date.setDate(date.getDate()-i);
    const volu = Math.floor(200000 + rand()*4500000);
    candles.push({date: date.toISOString().slice(0,10), open, high, low, close, volume: volu});
    price = close;
  }
  return candles;
}

function parseYahooChart(json, symbol){
  const result = json?.chart?.result?.[0];
  if(!result) throw new Error("no chart result");
  const ts = result.timestamp;
  const q = result.indicators?.quote?.[0];
  if(!ts || !q) throw new Error("missing timestamp/quote data");
  const candles = ts.map((t,i)=>({
    date: new Date(t*1000).toISOString().slice(0,10),
    open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i],
    volume: q.volume[i]||0
  })).filter(c => c.open!=null && c.high!=null && c.low!=null && c.close!=null
    && !isNaN(c.open) && !isNaN(c.close));
  if(candles.length < 20) throw new Error(`Too few candles (${candles.length})`);
  return candles;
}

/* ============================== SMC ENGINE ============================== */
function findSwings(candles, left=3, right=3){
  const highs=[], lows=[];
  for(let i=left;i<candles.length-right;i++){
    let isHigh=true, isLow=true;
    for(let j=i-left;j<=i+right;j++){
      if(j===i) continue;
      if(candles[j].high >= candles[i].high) isHigh=false;
      if(candles[j].low <= candles[i].low) isLow=false;
    }
    if(isHigh) highs.push(i);
    if(isLow) lows.push(i);
  }
  return {highs, lows};
}

function detectOrderBlocks(candles){
  const {highs, lows} = findSwings(candles);
  const obs = [];
  for(const hIdx of highs){
    const swingHigh = candles[hIdx].high;
    for(let i=hIdx+1;i<candles.length;i++){
      if(candles[i].close > swingHigh){
        let obIdx=-1;
        for(let k=i-1;k>=Math.max(hIdx,i-6);k--){
          if(candles[k].close < candles[k].open){ obIdx=k; break; }
        }
        if(obIdx>=0){
          obs.push({type:"bullish", kind:"OB", idx:obIdx, top: candles[obIdx].high, bottom: candles[obIdx].low, bosIdx:i, bosPrice: swingHigh});
        }
        break;
      }
    }
  }
  for(const lIdx of lows){
    const swingLow = candles[lIdx].low;
    for(let i=lIdx+1;i<candles.length;i++){
      if(candles[i].close < swingLow){
        let obIdx=-1;
        for(let k=i-1;k>=Math.max(lIdx,i-6);k--){
          if(candles[k].close > candles[k].open){ obIdx=k; break; }
        }
        if(obIdx>=0){
          obs.push({type:"bearish", kind:"OB", idx:obIdx, top: candles[obIdx].high, bottom: candles[obIdx].low, bosIdx:i, bosPrice: swingLow});
        }
        break;
      }
    }
  }
  return obs;
}

function detectFVGs(candles){
  const fvgs=[];
  for(let i=2;i<candles.length;i++){
    const c1=candles[i-2], c3=candles[i];
    if(c3.low > c1.high){ fvgs.push({type:"bullish", kind:"FVG", idx:i, top:c3.low, bottom:c1.high}); }
    if(c3.high < c1.low){ fvgs.push({type:"bearish", kind:"FVG", idx:i, top:c1.low, bottom:c3.high}); }
  }
  return fvgs;
}

function isUnmitigated(zone, candles, lastIdx){
  const formedAt = zone.kind==="OB" ? zone.bosIdx : zone.idx;
  for(let i=formedAt+1;i<=lastIdx;i++){
    if(zone.type==="bullish" && candles[i].close < zone.bottom) return false;
    if(zone.type==="bearish" && candles[i].close > zone.top) return false;
  }
  return true;
}

function findLiquidity(candles, lastIdx){
  const {highs, lows} = findSwings(candles);
  const liqHighs = [];
  for(const idx of highs){
    if(idx > lastIdx) continue;
    const lvl = candles[idx].high;
    let swept = false;
    for(let i=idx+1;i<=lastIdx;i++){ if(candles[i].close > lvl){ swept=true; break; } }
    if(!swept) liqHighs.push(lvl);
  }
  const liqLows = [];
  for(const idx of lows){
    if(idx > lastIdx) continue;
    const lvl = candles[idx].low;
    let swept = false;
    for(let i=idx+1;i<=lastIdx;i++){ if(candles[i].close < lvl){ swept=true; break; } }
    if(!swept) liqLows.push(lvl);
  }
  return {liqHighs, liqLows};
}

// Minimum SL/target distance (in points) required before a signal is allowed to fire
function minPointGap(price){
  if(price >= 1000) return 100;
  if(price >= 500) return 50;
  if(price >= 100) return 20;
  return 10;
}

function buildSignal(symbol, name, sector, candles){
  const last = candles[candles.length-1];
  const lastIdx = candles.length-1;

  // 52-week high/low & volume stats
  const yr = candles.slice(-252);
  const w52High = Math.max(...yr.map(c=>c.high));
  const w52Low  = Math.min(...yr.map(c=>c.low));
  const avgVol  = Math.round(yr.reduce((s,c)=>s+c.volume,0)/yr.length);
  const todayVol = last.volume;
  const volRatio = avgVol > 0 ? (todayVol/avgVol) : 1;
  const prevClose = candles[candles.length-2]?.close ?? last.close;
  const chgAmt = last.close - prevClose;
  const fromHigh = ((last.close - w52High)/w52High*100);
  const fromLow  = ((last.close - w52Low)/w52Low*100);
  const obs = detectOrderBlocks(candles).filter(z=>isUnmitigated(z,candles,lastIdx-1) && z.bosIdx >= lastIdx-60);
  const fvgs = detectFVGs(candles).filter(z=>isUnmitigated(z,candles,lastIdx-1) && z.idx >= lastIdx-60);
  const zones = [...obs, ...fvgs].sort((a,b)=> (b.idx??b.bosIdx) - (a.idx??a.bosIdx));
  const {liqHighs, liqLows} = findLiquidity(candles, lastIdx-1);
  const minGap = minPointGap(last.close);

  // Strategy: OB forms the move, the FVG created during that same impulsive leg is the
  // entry zone. We only fire once price comes back and touches the FVG's center
  // (consequent encroachment). SL sits just below/above the OB. Target is whichever is
  // nearer — the next unswept liquidity pool (old swing high/low) or the next same-direction FVG.
  let signal = null;

  // Only the LAST (most recent) POI counts — we never fall back to an older
  // OB+FVG combo sitting in the middle of the trend. Take the single most
  // recent unmitigated OB (either direction) and check just that one.
  const lastOb = [...obs].sort((a,b)=>b.bosIdx-a.bosIdx)[0] || null;

  if(lastOb && lastOb.type==="bullish"){
    const fvg = fvgs.find(f=>f.type==="bullish" && f.idx > lastOb.bosIdx && f.idx <= lastOb.bosIdx+10 && f.bottom >= lastOb.top*0.999);
    if(fvg){
      const center = (fvg.top+fvg.bottom)/2;
      const touchingCenter = last.close <= fvg.top*1.0008 && last.close >= fvg.bottom*0.9992;
      if(touchingCenter){
        const entry = center;
        const sl = lastOb.bottom;
        const liqTarget = liqHighs.filter(l=>l>entry).sort((a,b)=>a-b)[0] ?? null;
        const nextFvg = fvgs.filter(f=>f!==fvg && f.type==="bullish" && (f.top+f.bottom)/2 > entry)
          .sort((a,b)=>((a.top+a.bottom)/2)-((b.top+b.bottom)/2))[0];
        const fvgTarget = nextFvg ? (nextFvg.top+nextFvg.bottom)/2 : null;
        let target = null, targetSource = null;
        if(liqTarget!=null && fvgTarget!=null){ target = Math.min(liqTarget, fvgTarget); targetSource = target===liqTarget ? "Liquidity" : "Next FVG"; }
        else if(liqTarget!=null){ target=liqTarget; targetSource="Liquidity"; }
        else if(fvgTarget!=null){ target=fvgTarget; targetSource="Next FVG"; }

        if(target!=null){
          const slDist = entry - sl, targetDist = target - entry;
          if(slDist > 0 && targetDist > 0 && slDist >= minGap && targetDist >= minGap){
            signal = {direction:"BUY", entry, sl, target1: target, target2: entry + targetDist*1.5,
              rr: (targetDist/slDist).toFixed(1), zoneType:"FVG", top: fvg.top, bottom: fvg.bottom, idx: fvg.idx,
              targetSource, obZone: lastOb};
          }
        }
      }
    }
  } else if(lastOb && lastOb.type==="bearish"){
    const fvg = fvgs.find(f=>f.type==="bearish" && f.idx > lastOb.bosIdx && f.idx <= lastOb.bosIdx+10 && f.top <= lastOb.bottom*1.001);
    if(fvg){
      const center = (fvg.top+fvg.bottom)/2;
      const touchingCenter = last.close <= fvg.top*1.0008 && last.close >= fvg.bottom*0.9992;
      if(touchingCenter){
        const entry = center;
        const sl = lastOb.top;
        const liqTarget = liqLows.filter(l=>l<entry).sort((a,b)=>b-a)[0] ?? null;
        const nextFvg = fvgs.filter(f=>f!==fvg && f.type==="bearish" && (f.top+f.bottom)/2 < entry)
          .sort((a,b)=>((b.top+b.bottom)/2)-((a.top+a.bottom)/2))[0];
        const fvgTarget = nextFvg ? (nextFvg.top+nextFvg.bottom)/2 : null;
        let target = null, targetSource = null;
        if(liqTarget!=null && fvgTarget!=null){ target = Math.max(liqTarget, fvgTarget); targetSource = target===liqTarget ? "Liquidity" : "Next FVG"; }
        else if(liqTarget!=null){ target=liqTarget; targetSource="Liquidity"; }
        else if(fvgTarget!=null){ target=fvgTarget; targetSource="Next FVG"; }

        if(target!=null){
          const slDist = sl - entry, targetDist = entry - target;
          if(slDist > 0 && targetDist > 0 && slDist >= minGap && targetDist >= minGap){
            signal = {direction:"SELL", entry, sl, target1: target, target2: entry - targetDist*1.5,
              rr: (targetDist/slDist).toFixed(1), zoneType:"FVG", top: fvg.top, bottom: fvg.bottom, idx: fvg.idx,
              targetSource, obZone: lastOb};
          }
        }
      }
    }
  }

  const nearest = zones[0] || null;
  const prevC = candles[candles.length-2]?.close ?? last.close;
  const chgPct = ((last.close-prevC)/prevC*100);

  return {symbol, name, sector, candles, obs, fvgs, ltp: last.close, chgPct, chgAmt, signal, nearestZone: nearest, allZones: zones, dataSource: "unknown",
    w52High, w52Low, avgVol, todayVol, volRatio, fromHigh, fromLow};
}


function genPastSignals(stocks){
  const rand = mulberry32(hashStr("history-seed")());
  const out=[];
  const pickFrom = stocks.slice(0, 60);
  for(let i=0;i<14;i++){
    const s = pickFrom[Math.floor(rand()*pickFrom.length)];
    const dir = rand()>0.5 ? "BUY":"SELL";
    const base = s.ltp * (0.94 + rand()*0.12);
    const risk = base*(0.012+rand()*0.018);
    const entry = base;
    const sl = dir==="BUY" ? entry-risk : entry+risk;
    const target = dir==="BUY" ? entry+risk*(1.8+rand()*1.6) : entry-risk*(1.8+rand()*1.6);
    const outcome = rand()>0.36 ? "TARGET" : (rand()>0.5 ? "STOPLOSS":"OPEN");
    const daysAgo = 1+Math.floor(rand()*22);
    const d = new Date(); d.setDate(d.getDate()-daysAgo);
    out.push({symbol:s.symbol, name:s.name, direction:dir, zoneType: rand()>0.5?"OB":"FVG", entry, sl, target, outcome, date: d.toISOString().slice(0,10)});
  }
  return out.sort((a,b)=> new Date(b.date)-new Date(a.date));
}

function useCountUp(value, duration=900){
  const [display,setDisplay] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const start = performance.now();
    const from = display;
    function tick(now){
      const p = Math.min(1, (now-start)/duration);
      const eased = 1-Math.pow(1-p,3);
      setDisplay(from + (value-from)*eased);
      if(p<1) ref.current = requestAnimationFrame(tick);
    }
    ref.current = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(ref.current);
  },[value]);
  return display;
}

/* ============================== CANDLESTICK CHART ============================== */
function CandleChart({stock, height=320}){
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const [view,setView] = useState({len:90, end:null});
  const dragRef = useRef(null);
  const [redrawTick,setRedrawTick] = useState(0);

  useEffect(()=>{ setView({len:90, end: stock.candles.length-1}); },[stock.symbol]);

  useEffect(()=>{
    const wrap = wrapRef.current;
    if(!wrap || typeof ResizeObserver === "undefined") return;
    const ro = new ResizeObserver(()=> setRedrawTick(t=>t+1));
    ro.observe(wrap);
    return () => ro.disconnect();
  },[]);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const wrap = wrapRef.current;
    const dpr = window.devicePixelRatio || 1;
    const W = wrap.clientWidth, H = height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+"px"; canvas.style.height = H+"px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);

    const total = stock.candles.length;
    const len = Math.max(15, Math.min(view.len, total));
    const end = view.end==null ? total-1 : Math.max(len-1, Math.min(view.end, total-1));
    const candles = stock.candles.slice(end-len+1, end+1);
    const padL=52, padR=14, padT=16, padB=24;
    const plotW = W-padL-padR, plotH = H-padT-padB;

    let min = Infinity, max=-Infinity;
    candles.forEach(c=>{ min=Math.min(min,c.low); max=Math.max(max,c.high); });
    if(stock.signal){ min=Math.min(min, stock.signal.sl); max=Math.max(max, Math.max(stock.signal.target1,stock.signal.target2)); }
    const pad = (max-min)*0.08 || 1;
    min-=pad; max+=pad;

    const xFor = i => padL + (i/(candles.length-1||1))*plotW;
    const yFor = p => padT + (1-(p-min)/(max-min))*plotH;

    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    ctx.font = "10px JetBrains Mono";
    ctx.fillStyle = "#4a5568";
    for(let i=0;i<=4;i++){
      const p = min + (max-min)*i/4;
      const y = yFor(p);
      ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
      ctx.fillText(fmt(p), 2, y+3);
    }

    const cw = Math.max(2, plotW/candles.length*0.62);
    candles.forEach((c,i)=>{
      const x = xFor(i);
      const up = c.close>=c.open;
      ctx.strokeStyle = up?"#00d68f":"#ff5370";
      ctx.fillStyle = up?"#00d68f":"#ff5370";
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x, yFor(c.high)); ctx.lineTo(x, yFor(c.low)); ctx.stroke();
      const yO=yFor(c.open), yC=yFor(c.close);
      ctx.fillRect(x-cw/2, Math.min(yO,yC), cw, Math.max(1,Math.abs(yC-yO)));
    });

    if(stock.signal){
      const s = stock.signal;
      const lines = [
        {p:s.entry, color:"#e8ecf0", label:"Entry ₹"+fmt(s.entry)},
        {p:s.sl, color:"#ff5370", label:"SL ₹"+fmt(s.sl)},
        {p:s.target1, color:"#00d68f", label:"T1 ₹"+fmt(s.target1)},
        {p:s.target2, color:"#00d68f", label:"T2 ₹"+fmt(s.target2)},
      ];
      lines.forEach(l=>{
        const y = yFor(l.p);
        ctx.strokeStyle = l.color; ctx.globalAlpha=0.75; ctx.setLineDash([6,4]); ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha=1;
        ctx.fillStyle = l.color; ctx.font="9.5px JetBrains Mono";
        ctx.fillText(l.label, W-padR-86, y-3);
      });
    }

    if(end === total-1){
      const lastY = yFor(candles[candles.length-1].close);
      ctx.fillStyle="#e8ecf0";
      ctx.beginPath(); ctx.arc(W-padR, lastY, 3,0,7); ctx.fill();
    }
  },[stock, height, view, redrawTick]);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const onWheel = (e) => {
      e.preventDefault();
      setView(v=>{
        const total = stock.candles.length;
        const factor = e.deltaY > 0 ? 1.12 : 0.89;
        const len = Math.max(15, Math.min(total, Math.round(v.len*factor)));
        const end = v.end==null ? total-1 : v.end;
        return {len, end};
      });
    };
    const onDown = (e) => { dragRef.current = {x: e.clientX, end: view.end==null ? stock.candles.length-1 : view.end}; canvas.style.cursor = "grabbing"; };
    const onMove = (e) => {
      if(!dragRef.current) return;
      const wrap = wrapRef.current;
      const plotW = wrap.clientWidth - 54 - 16;
      const dx = e.clientX - dragRef.current.x;
      const candleShift = Math.round((dx/plotW) * view.len);
      setView(v=>{ const total = stock.candles.length; const end = Math.max(v.len-1, Math.min(total-1, dragRef.current.end - candleShift)); return {len:v.len, end}; });
    };
    const onUp = () => { dragRef.current=null; if(canvas) canvas.style.cursor="grab"; };
    canvas.addEventListener("wheel", onWheel, {passive:false});
    canvas.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    canvas.style.cursor = "grab";
    return () => { canvas.removeEventListener("wheel", onWheel); canvas.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  },[stock, view]);

  return (
    <div ref={wrapRef} className="w-full relative">
      <canvas ref={canvasRef}></canvas>
      <button onClick={()=>setView({len:90, end: stock.candles.length-1})}
        className="absolute top-2 right-2 text-[10px] px-2 py-1 rounded-md border border-[var(--border)] bg-[var(--surface)] text-[var(--muted)] font-mono transition hover:text-[var(--text)]">
        Reset
      </button>
    </div>
  );
}

/* ============================== MINI SPARKLINE ============================== */
function Spark({candles, positive}){
  const ref = useRef(null);
  useEffect(()=>{
    const c = ref.current; if(!c) return;
    const dpr = window.devicePixelRatio||1;
    const W=72,H=28;
    c.width=W*dpr; c.height=H*dpr; c.style.width=W+"px"; c.style.height=H+"px";
    const ctx=c.getContext("2d"); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
    const data = candles.slice(-30).map(d=>d.close);
    const min=Math.min(...data), max=Math.max(...data);
    ctx.beginPath();
    data.forEach((v,i)=>{ const x=i/(data.length-1)*W; const y=H-((v-min)/(max-min||1))*H; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.strokeStyle = positive?"#00d68f":"#ff5370";
    ctx.lineWidth=1.5; ctx.stroke();
  },[candles,positive]);
  return <canvas ref={ref}></canvas>;
}

function HeroScanner(){

    const rand = mulberry32(42);
    let p = 100;
    return Array.from({length:26}).map((_,i)=>{
      const o=p; const c=o*(1+(rand()-0.45)*0.05); p=c;
      return {o,c,h:Math.max(o,c)*(1+rand()*0.015), l:Math.min(o,c)*(1-rand()*0.015), i};
    });
  },[]);
  const min = Math.min(...bars.map(b=>b.l)), max = Math.max(...bars.map(b=>b.h));
  const H=200,W=560;
  const x = i => 10 + i*(W-20)/(bars.length-1);

    <div className="relative w-full max-w-[560px] mx-auto">

// ── Read pre-fetched news from Supabase (filled nightly by fetch-news.js via GitHub Actions) ──
// This is what makes news "load once" for everyone — the site itself almost never calls Marketaux.
async function sbGetNews(key){
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/news_cache?select=data,date&key=eq.${encodeURIComponent(key)}&order=id.desc&limit=1`,
      {headers: SB_HEADERS, signal: AbortSignal.timeout(8000)}
    );
    if(!res.ok) return null;
    const rows = await res.json();
    if(rows && rows.length && Array.isArray(rows[0].data) && rows[0].data.length > 0) return rows[0].data;
    return null;
  } catch(e){ return null; }
}

async function fetchNewsRaw(paramsStr){
  try{
    const targetUrl = `https://api.marketaux.com/v1/news/all?${paramsStr}&language=en&api_token=${NEWS_API_KEY}&limit=9`;
    // Try direct first, then CORS proxy
    const urls = [
      targetUrl,
      `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
    ];
    for(const url of urls){
      try{
        const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
        if(!res.ok) continue;
        const json = await res.json();
        if(json.data && json.data.length > 0) return json.data;
      } catch(e){ continue; }
    }
    return [];
  } catch(e){ return []; }
}

async function fetchMarketNews(symbol){
  // 1. Try the Supabase cache that fetch-news.js fills every night at 1am IST
  if(symbol){
    const cached = await sbGetNews(`stock_${symbol}`);
    if(cached) return cached;
  }
  // 2. Fallback — live call directly to Marketaux (only happens if cache is missing/empty)
  const params = symbol
    ? `symbols=${encodeURIComponent(symbol+".NSE")}&filter_entities=true`
    : `countries=in&filter_entities=true`;
  return fetchNewsRaw(params);
}

async function fetchCategoryNews(cat){
  // 1. Try the Supabase cache filled nightly by fetch-news.js — instant, no API hit
  const cached = await sbGetNews(cat.key);
  if(cached) return cached;
  // 2. Fallback — live call directly to Marketaux (only if cache is missing/empty)
  let p = `search=${encodeURIComponent(cat.search)}`;
  if(cat.countries) p += `&countries=${cat.countries}`;
  return fetchNewsRaw(p);
}

function timeAgoFn(dt){
  const diff = (Date.now() - new Date(dt))/1000;
  if(diff < 3600) return Math.floor(diff/60)+"m ago";
  if(diff < 86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

              <span className={"w-2 h-2 rounded-full "+(selectedStock.signal.direction==="BUY"?"pulse-dot":"pulse-dot-bear")} style={{background:selectedStock.signal.direction==="BUY"?"var(--bull)":"var(--bear)"}}></span>
              {selectedStock.signal.direction==="BUY"?"BUY SIGNAL ACTIVE":"SELL SIGNAL ACTIVE"} · {zoneLabel(selectedStock.signal.zoneType)}
            </div>

            <div className="space-y-3 text-[13px] flex-1">
              {/* 52W + Volume stats row */}
              <div className="grid grid-cols-2 gap-2 mb-1">
                {[
                  {label:"52W High", value:"₹"+fmt(selectedStock.w52High), color:"var(--bull)", hint:(selectedStock.fromHigh).toFixed(1)+"% from high"},
                  {label:"52W Low",  value:"₹"+fmt(selectedStock.w52Low),  color:"var(--bear)", hint:"+"+selectedStock.fromLow.toFixed(1)+"% from low"},
                  {label:"Today Vol", value: selectedStock.todayVol>1e6?(selectedStock.todayVol/1e6).toFixed(2)+"M":selectedStock.todayVol>1e3?(selectedStock.todayVol/1e3).toFixed(0)+"K":selectedStock.todayVol, color: selectedStock.volRatio>1.5?"var(--ob)":null,
                    hint: selectedStock.volRatio>=1 ? (selectedStock.volRatio.toFixed(1)+"× avg volume — high activity") : (selectedStock.volRatio.toFixed(1)+"× avg volume")},
                  {label:"Avg Vol",   value: selectedStock.avgVol>1e6?(selectedStock.avgVol/1e6).toFixed(2)+"M":selectedStock.avgVol>1e3?(selectedStock.avgVol/1e3).toFixed(0)+"K":selectedStock.avgVol, color:null, hint:"20-day average volume"},
                ].map((row,i)=>(
                  <div key={i} className="rounded-xl p-2.5" style={{background:"var(--surface-2)",border:"1px solid var(--border)"}}>
                    <div className="text-[10px] mb-1" style={{color:"var(--muted)"}}>{row.label}</div>
                    <div className="font-mono font-bold text-[13px]" style={row.color?{color:row.color}:{}}>{row.value}</div>
                    <div className="text-[9.5px] mt-0.5" style={{color:"var(--muted-2)"}}>{row.hint}</div>
                  </div>
                ))}
              </div>
              {[
                {label:"Enter at FVG center", value:"₹"+fmt(selectedStock.signal.entry), color:null, hint:"50% of the Fair Value Gap"},
                {label:"Exit (Stop Loss) below the OB", value:"₹"+fmt(selectedStock.signal.sl), color:"var(--bear)", hint:"Just past the Order Block"},
                {label:"Target ("+(selectedStock.signal.targetSource||"Liquidity")+")", value:"₹"+fmt(selectedStock.signal.target1), color:"var(--bull)", hint:selectedStock.signal.targetSource==="Liquidity"?"Nearest unswept liquidity pool":"Center of the next FVG in this direction"},
                {label:"Extended target", value:"₹"+fmt(selectedStock.signal.target2), color:"var(--bull)", hint:"If momentum carries beyond the first target"},
                {label:"Risk to Reward", value:"1 : "+selectedStock.signal.rr, color:null, hint:"For every ₹1 you risk, you aim for ₹"+selectedStock.signal.rr},
                {label:"FVG price range", value:"₹"+fmt(selectedStock.signal.bottom)+" – ₹"+fmt(selectedStock.signal.top), color:null, hint:"The Fair Value Gap zone"},
              ].map((row,i)=>(
                <div key={i} className="rounded-xl p-3" style={{background:"var(--surface-2)",border:"1px solid var(--border)"}}>
                  <div className="flex items-center justify-between">
                    <span className="text-[12px]" style={{color:"var(--muted)"}}>{row.label}</span>
                    <span className="font-mono font-semibold text-[13px]" style={row.color?{color:row.color}:{color:"var(--text)"}}>{row.value}</span>
                  </div>
                  <div className="text-[10.5px] mt-1" style={{color:"var(--muted-2)"}}>{row.hint}</div>
                </div>
              ))}
            </div>
          </>
        ) : (
          <div>
            <div className="text-[13px] mb-3" style={{color:"var(--muted)"}}>
              No active signal for <strong>{selectedStock.symbol}</strong> right now — the stock hasn't returned to a key zone yet.
            </div>
            {selectedStock.nearestZone && (
              <div className="rounded-xl p-4" style={{background:"var(--surface-2)",border:"1px solid var(--border)"}}>
                <div className="text-[12px] font-semibold mb-1">Nearest zone to watch:</div>
                <span className={selectedStock.nearestZone.kind==="OB"?"badge-ob":"badge-fvg"+" text-[11px] px-2 py-0.5 rounded"}>
                  {zoneLabel(selectedStock.nearestZone.kind)}
                </span>
                <div className="font-mono text-[13px] mt-2">₹{fmt(selectedStock.nearestZone.bottom)} – ₹{fmt(selectedStock.nearestZone.top)}</div>
                <div className="text-[11.5px] mt-1" style={{color:"var(--muted)"}}>A signal will trigger if price enters this range.</div>
              </div>
            )}
          </div>
        )}
        <div className="mt-4 pt-4 text-[11px] leading-relaxed" style={{color:"var(--muted-2)",borderTop:"1px solid var(--border)"}}>
          ⚠️ These signals are for educational purposes only. Past performance does not guarantee future results. Always use your own judgment and manage your risk.
        </div>
      </div>
    </div>
  );
}

function App(){
  const [loading,setLoading] = useState(true);
  const [stocks,setStocks] = useState([]);
  const [query,setQuery] = useState("");
  const [selected,setSelected] = useState(null);
  const [sortBy,setSortBy] = useState("signal");
  const [filterSector,setFilterSector] = useState("All");
  const [scanTime,setScanTime] = useState(null);
  const [showMobileSearch, setShowMobileSearch] = useState(false);
  const [activeTab, setActiveTab] = useState("signals");
  const [showNewsPage, setShowNewsPage] = useState(false);
  const [showStockPage, setShowStockPage] = useState(false);

  const [cacheStatus, setCacheStatus] = useState("checking");
  const [cacheError, setCacheError] = useState(null);
  const [fetchLog, setFetchLog] = useState([]);
  const [rateCountdown, setRateCountdown] = useState(0);
  const [showFetchPanel, setShowFetchPanel] = useState(false);

  useEffect(()=>{
    let cancelled = false;

    function todayStr(){
      const now = new Date();
      const ist = new Date(now.getTime() + (5.5*60*60*1000));
      return ist.toISOString().slice(0,10);
    }

    /* ─── AUTO REFRESH AT 1AM IST ─── */
    function scheduleRefresh(){
      const now = new Date();
      const ist = new Date(now.getTime() + (5.5*60*60*1000));
      const next1am = new Date(ist);
      next1am.setHours(1,0,0,0);
      if(ist.getHours() >= 1) next1am.setDate(next1am.getDate()+1);
      const ms = next1am.getTime() - ist.getTime();
      return setTimeout(()=>window.location.reload(), ms);
    }
    const refreshTimer = scheduleRefresh();

    async function loadStocks(){

      /* 1. CHECK SUPABASE CACHE — shared across all visitors */
      const cached = await sbGetCache();
      if(cached && cached.date === todayStr() && cached.data && cached.data.length > 0){
        // Reject cache if it contains zero live stocks (was saved from a pure fake-data run)
        const cachedLiveCount = cached.live_count ?? cached.data.filter(s => s.dataSource === "live").length;
        if(cachedLiveCount === 0){
          console.warn("[Cache] Supabase cache exists but has 0 live stocks — ignoring and re-fetching.");
          // Delete the bad cache so it doesn't block future visitors either
          try{ await fetch(`${SUPABASE_URL}/rest/v1/stock_cache?id=gte.0`, {method:"DELETE", headers:SB_HEADERS}); }catch(e){}
        } else {
          console.log(`[Cache] Loading from Supabase — ${cachedLiveCount} live stocks.`);
          const rebuilt = cached.data.map(s => {
            const sig = buildSignal(s.symbol, s.name, s.sector, s.candles);
            sig.dataSource = s.dataSource || "unknown";
            return sig;
          });
          if(!cancelled){
            setStocks(rebuilt);
            setScanTime(new Date(cached.date));
            setLoading(false);
            setCacheStatus("cached");
            if(window._onStocksReady) window._onStocksReady(rebuilt);
          }
          return;
        }
      }

      /* 2. NO CACHE — fetch fresh from Yahoo Finance */
      setCacheStatus("fetching");
      const BATCH = 10;
      const all = [];
      for(let i=0; i<UNIVERSE.length; i+=BATCH){
        if(cancelled) return;
        const batch = UNIVERSE.slice(i, i+BATCH);
        const results = await Promise.all(
          batch.map(async ([symbol,name,sector])=>{
            const {candles, source, reason} = await genCandles(symbol, (sym, status, msg) => {
              if(!cancelled) setFetchLog(prev => [...prev, {sym, status, msg, ts: Date.now()}]);
            });
            const sig = buildSignal(symbol, name, sector, candles);
            sig.dataSource = source;
            return sig;
          })
        );
        all.push(...results);
        if(!cancelled) setStocks([...all]);
        if(i+BATCH < UNIVERSE.length && !cancelled){
          // brief pause between batches to avoid hammering Yahoo's endpoint
          for(let s=3; s>0; s--){
            if(cancelled) return;
            setRateCountdown(s);
            await new Promise(r=>setTimeout(r, 1000));
          }
          setRateCountdown(0);
        }
      }

      /* 3. SAVE TO SUPABASE — next visitor anywhere loads instantly */
      if(!cancelled){
        const liveCount = all.filter(s => s.dataSource === "live").length;
        console.log(`[Fetch] Complete — ${liveCount} live, ${all.length - liveCount} simulated.`);
        const saveResult = await sbSaveCache(todayStr(), all, liveCount);
        if(!saveResult.ok) setCacheError(saveResult.reason);
        setScanTime(new Date());
        setLoading(false);
        setCacheStatus("done");
        if(window._onStocksReady) window._onStocksReady(all);
      }
    }

    // expose force-refresh to window so the button can trigger it
    window._forceRefresh = async () => {
      if(!cancelled){
        setFetchLog([]);
        setStocks([]);
        setLoading(true);
        setCacheStatus("fetching");
        // delete supabase cache
        try{ await fetch(`${SUPABASE_URL}/rest/v1/stock_cache?id=gte.0`, {method:"DELETE", headers:SB_HEADERS}); }catch(e){}
        loadStocks();
      }
    };

    loadStocks();
    return ()=>{ cancelled=true; clearTimeout(refreshTimer); };
  },[]);

  // Listen for stock selections from the plain-HTML topbar search
  useEffect(()=>{
    const handler = (e) => { setSelected(e.detail); setActiveTab("chart"); setShowStockPage(true); };
    window.addEventListener('selectStock', handler);
    return () => window.removeEventListener('selectStock', handler);
  },[]);

  // Listen for requests (from anywhere — plain HTML nav, in-app links) to open the full News page
  useEffect(()=>{
    const handler = () => setShowNewsPage(true);
    window.addEventListener('openNewsPage', handler);
    return () => window.removeEventListener('openNewsPage', handler);
  },[]);

  // Listen for requests to open the full Stock Chart page
  useEffect(()=>{
    const handler = () => setShowStockPage(true);
    window.addEventListener('openStockPage', handler);
    return () => window.removeEventListener('openStockPage', handler);
  },[]);

  const pastSignals = useMemo(()=> stocks.length? genPastSignals(stocks): [], [stocks]);
  const activeSignals = useMemo(()=> stocks.filter(s=>s.signal).sort((a,b)=> Math.abs(a.chgPct)-Math.abs(b.chgPct)), [stocks]);
  const sectors = useMemo(()=>["All", ...Array.from(new Set(UNIVERSE.map(u=>u[2]))).sort()],[]);

  const filtered = useMemo(()=>{
    let arr = stocks;
    if(filterSector!=="All") arr = arr.filter(s=>s.sector===filterSector);
    if(query.trim()){ const q=query.trim().toUpperCase(); arr = arr.filter(s=> s.symbol.includes(q) || s.name.toUpperCase().includes(q)); }
    arr = [...arr].sort((a,b)=>{
      if(sortBy==="signal") return (b.signal?1:0)-(a.signal?1:0) || b.chgPct-a.chgPct;
      if(sortBy==="gainers") return b.chgPct-a.chgPct;
      if(sortBy==="losers") return a.chgPct-b.chgPct;
      if(sortBy==="az") return a.symbol.localeCompare(b.symbol);
      return 0;
    });
    return arr;
  },[stocks,query,sortBy,filterSector]);

  const searchResults = useMemo(()=>{
    if(!query.trim()) return [];
    const q=query.trim().toUpperCase();
    return stocks.filter(s=>s.symbol.includes(q) || s.name.toUpperCase().includes(q)).slice(0,8);
  },[query,stocks]);

  const totalSignals = useCountUp(activeSignals.length);
  const totalScanned = useCountUp(stocks.length);
  const bullCount = activeSignals.filter(s=>s.signal.direction==="BUY").length;
  const bearCount = activeSignals.filter(s=>s.signal.direction==="SELL").length;
  const totalBull = useCountUp(bullCount);

  useEffect(()=>{
    if(selected===null && activeSignals.length){ setSelected(activeSignals[0].symbol); }
    if(selected===null && stocks.length && !activeSignals.length){ setSelected(stocks[0].symbol); }
  },[activeSignals, stocks]);

  const selectedStock = stocks.find(s=>s.symbol===selected);

  const handleSelectStock = (symbol) => {
    setSelected(symbol);
    setActiveTab("chart");
    setShowStockPage(true);
  };

  return (
    <div id="page-content" style={{background:"var(--bg)"}}>

      {/* ── FULL-SCREEN NEWS PAGE (opens on top of everything, like a separate page) ── */}
      {showNewsPage && (
        <div className="fixed inset-0 z-[200] overflow-y-auto" style={{background:"var(--bg)"}}>
          <div className="sticky top-0 z-10 flex items-center gap-3 px-4 md:px-8 py-3.5" style={{background:"var(--bg)",borderBottom:"1px solid var(--border)"}}>
            <button onClick={()=>setShowNewsPage(false)} aria-label="Back"
              className="flex items-center justify-center rounded-full w-9 h-9 flex-shrink-0 transition hover:brightness-110"
              style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div>
              <div className="text-[11px] font-mono" style={{color:"var(--fvg)"}}>NEWS</div>
              <div className="font-display font-bold text-[15px] leading-tight">Markets &amp; Business Newsroom</div>
            </div>
          </div>
          <div className="max-w-[1320px] mx-auto px-4 md:px-8 py-6">
            <NewsHub/>
          </div>
        </div>
      )}

      {/* ── FULL-SCREEN STOCK CHART PAGE (chart + signal + 52W stats + that stock's news) ── */}
      {showStockPage && (
        <div className="fixed inset-0 z-[200] overflow-y-auto" style={{background:"var(--bg)"}}>
          <div className="sticky top-0 z-10 flex items-center gap-3 px-4 md:px-8 py-3.5" style={{background:"var(--bg)",borderBottom:"1px solid var(--border)"}}>
            <button onClick={()=>setShowStockPage(false)} aria-label="Back"
              className="flex items-center justify-center rounded-full w-9 h-9 flex-shrink-0 transition hover:brightness-110"
              style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div className="flex-1 min-w-0">
              <div className="text-[11px] font-mono" style={{color:"var(--fvg)"}}>STOCK PAGE</div>
              <div className="font-display font-bold text-[15px] leading-tight truncate">
                {selectedStock ? `${selectedStock.symbol} — ${selectedStock.name}` : "Stock Chart"}
              </div>
            </div>
            <input type="text" placeholder="Switch stock…" defaultValue=""
              onKeyDown={e=>{
                if(e.key==="Enter"){
                  const q = e.target.value.trim().toUpperCase();
                  const hit = stocks.find(s=>s.symbol===q) || stocks.find(s=>s.symbol.includes(q) || s.name.toUpperCase().includes(q));
                  if(hit){ setSelected(hit.symbol); e.target.value=""; e.target.blur(); }
                }
              }}
              className="hidden md:block px-3 py-1.5 rounded-lg text-[12.5px] w-[160px]"
              style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)"}}/>
          </div>
          <div className="max-w-[1320px] mx-auto px-4 md:px-8 py-6">
            <StockDetailContent stock={selectedStock} loading={loading}/>
          </div>
        </div>
      )}

      {/* MOBILE SEARCH OVERLAY handled by plain HTML above */}

      {/* ── FETCH STATUS PANEL ── */}
      {(cacheStatus === "fetching" || cacheStatus === "done" || fetchLog.length > 0) && (
        <div style={{position:"fixed",bottom: "env(safe-area-inset-bottom, 0px)",left:0,right:0,zIndex:90,background:"#0d1117",borderTop:"1px solid #2a3344",padding:"0"}}>
          {/* header bar */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",userSelect:"none"}} onClick={()=>setShowFetchPanel(p=>!p)}>
            <div style={{width:8,height:8,borderRadius:"50%",background: cacheStatus==="fetching"?"#f0b94d": cacheStatus==="done"?"#00d68f":"#7d8fa8",flexShrink:0,
              boxShadow: cacheStatus==="fetching"?"0 0 0 0 rgba(240,185,77,.6)":undefined,
              animation: cacheStatus==="fetching"?"pulseDot 1.4s ease-in-out infinite":undefined}}></div>
            <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:11,color: cacheError?"#ff5d6c":"#e8ecf0",flex:1}}>
              {cacheStatus==="fetching"
                ? `Fetching live data — ${stocks.length}/${UNIVERSE.length} stocks loaded${rateCountdown>0 ? ` · rate limit cooldown ${rateCountdown}s`:""}…`
                : cacheError
                ? `Data fetched, but saving to the database failed: ${cacheError}`
                : `Data fetch complete — ${fetchLog.filter(l=>l.status==="live").length} live · ${fetchLog.filter(l=>l.status==="fake").length} simulated`}
            </span>
            <button onClick={e=>{e.stopPropagation(); window._forceRefresh && window._forceRefresh();}}
              style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,padding:"3px 10px",borderRadius:6,border:"1px solid #2a3344",background:"#161b22",color:"#7d8fa8",cursor:"pointer",flexShrink:0}}>
              Force Refresh
            </button>
            <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:11,color:"#4a5568",flexShrink:0}}>{showFetchPanel?"▼":"▲"}</span>
          </div>

          {/* progress bar */}
          <div style={{height:2,background:"#1c2230"}}>
            <div style={{height:"100%",background: cacheStatus==="done"?"#00d68f":"#f0b94d",
              width: cacheStatus==="done"?"100%": (stocks.length/UNIVERSE.length*100)+"%",
              transition:"width 0.4s ease"}}></div>
          </div>

          {/* expandable log */}
          {showFetchPanel && (
            <div style={{maxHeight:220,overflowY:"auto",padding:"8px 16px 12px",display:"flex",flexDirection:"column",gap:3}}>
              {fetchLog.length===0 && <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:11,color:"#4a5568"}}>Waiting for first batch…</div>}
              {[...fetchLog].reverse().map((entry,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontFamily:"JetBrains Mono,monospace",fontSize:11}}>
                  <span style={{color: entry.status==="live"?"#00d68f": entry.status==="fake"?"#ff5370":"#f0b94d", width:8, flexShrink:0}}>
                    {entry.status==="live"?"✓": entry.status==="fake"?"✗":"…"}
                  </span>
                  <span style={{color:"#e8ecf0",width:110,flexShrink:0}}>{entry.sym}</span>
                  <span style={{color: entry.status==="live"?"#00d68f": entry.status==="fake"?"#ff5370":"#7d8fa8"}}>
                    {entry.status==="live"?"live data": entry.status==="fake"? `simulated${entry.msg?" ("+entry.msg+")":""}` :"fetching…"}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* HERO */}
      <section className="max-w-[1320px] mx-auto px-4 md:px-8 pt-10 pb-10 grid lg:grid-cols-[1.1fr_0.9fr] gap-8 items-center">
        <div>
          <div className="inline-flex items-center gap-2 text-[11px] font-mono rounded-full px-3 py-1.5 mb-5 float-1" style={{background:"var(--ob-soft)",border:"1px solid rgba(240,185,77,.3)",color:"var(--ob)"}}>
            <span className="w-1.5 h-1.5 rounded-full" style={{background:"var(--ob)"}}></span>
            100% FREE · ALL NIFTY 100 STOCKS COVERED
          </div>
          <h1 className="font-display hero-title leading-tight font-bold" style={{fontSize:"clamp(28px,5vw,52px)"}}>
            Know exactly <span style={{color:"var(--bull)"}}>when to buy</span><br/>
            and <span style={{color:"var(--bear)"}}>when to sell</span> —<br/>
            before it moves.
          </h1>
          <p className="mt-4 text-[15px] leading-relaxed max-w-lg" style={{color:"var(--muted)"}}>
            We scan all 100 Nifty stocks every day and find the exact price zones where big money previously bought or sold.
            When a stock comes back to that zone, <span style={{color:"var(--ob)"}}>you get a signal</span> with the entry price,
            stop loss, and target — all calculated for you. No analysis needed.
          </p>
          <div className="mt-6 flex flex-wrap gap-3">
            <a href="#signals" className="px-5 py-2.5 rounded-lg text-[13px] font-semibold transition hover:brightness-110" style={{background:"var(--bull)",color:"#001a10"}}>
              View Today's Signals
            </a>
            <a href="#stocks" className="px-5 py-2.5 rounded-lg border text-[13px] font-semibold transition hover:border-[var(--muted-2)]" style={{border:"1px solid var(--border)",color:"var(--text)"}}>
              Browse All 100 Stocks
            </a>
          </div>
          <div className="mt-8 grid grid-cols-3 gap-4 max-w-sm">
            <div className="rounded-xl p-3" style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
              <div className="font-display stat-num font-bold font-mono" style={{fontSize:"clamp(20px,4vw,28px)"}}>{loading?"—":Math.round(totalScanned)}</div>
              <div className="text-[11px] mt-0.5" style={{color:"var(--muted)"}}>Stocks<br/>scanned</div>
            </div>
            <div className="rounded-xl p-3" style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
              <div className="font-display stat-num font-bold font-mono" style={{fontSize:"clamp(20px,4vw,28px)",color:"var(--bull)"}}>{loading?"—":Math.round(totalSignals)}</div>
              <div className="text-[11px] mt-0.5" style={{color:"var(--muted)"}}>Active<br/>signals</div>
            </div>
            <div className="rounded-xl p-3" style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
              <div className="font-display stat-num font-bold font-mono" style={{fontSize:"clamp(20px,4vw,28px)"}}>
                <span style={{color:"var(--bull)"}}>{loading?"—":Math.round(totalBull)}</span>
                <span style={{color:"var(--muted-2)",fontSize:"14px"}}>/</span>
                <span style={{color:"var(--bear)"}}>{loading?"—":bearCount}</span>
              </div>
              <div className="text-[11px] mt-0.5" style={{color:"var(--muted)"}}>Buy vs<br/>Sell</div>
            </div>
          </div>
        </div>
        <div className="hidden lg:block">
          <div className="rounded-2xl p-5 overflow-hidden" style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
            <div className="flex items-center justify-between mb-3">
              <span className="text-[11px] font-mono" style={{color:"var(--muted)"}}>LIVE SCAN · DAILY CHART</span>
              <span className="flex items-center gap-1.5 text-[10px] font-mono" style={{color:"var(--bull)"}}>
                <span className="w-1.5 h-1.5 rounded-full pulse-dot" style={{background:"var(--bull)"}}></span>SCANNING
              </span>
            </div>
            <HeroScanner/>
          </div>

<!-- Plain JS: wire up the fixed topbar once React has built the stock data -->
<script>
  // ── Shared stock data (populated by React after load) ──
  window._stockData = [];

  // React calls this after stocks are ready
  window._onStocksReady = function(stocks) {
    window._stockData = stocks;
    buildTicker(stocks);
    updateScanTime();
  };

  // Build scrolling ticker
  function buildTicker(stocks) {
    const wrap = document.getElementById('ticker-inner');
    if (!wrap) return;
    const all = [...stocks, ...stocks];
    wrap.innerHTML = all.map(s => {
      const up = s.chgPct >= 0;
      const color = up ? '#00d68f' : '#ff5370';
      const arrow = up ? '▲' : '▼';
      return `<div class="ticker-item" style="font-family:'JetBrains Mono',monospace;font-size:12px;">
        <span style="color:var(--muted)">${s.symbol}</span>
        <span style="color:var(--text);margin:0 4px">₹${fmt2(s.ltp)}</span>
        <span style="color:${color}">${arrow} ${Math.abs(s.chgPct).toFixed(2)}%</span>
      </div>`;
    }).join('');
  }

  function updateScanTime() {
    const el = document.getElementById('scan-time');
    if (el) el.textContent = 'Last scan ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }

  function fmt2(n) {
    return n == null ? '—' : n.toLocaleString('en-IN', {maximumFractionDigits:2, minimumFractionDigits:2});
  }

  // ── Desktop search ──
  function handleDesktopSearch(val) {
    const q = val.trim().toUpperCase();
    const dd = document.getElementById('search-dropdown');
    if (!q || !window._stockData.length) { dd.classList.remove('open'); return; }
    const results = window._stockData.filter(s => s.symbol.includes(q) || s.name.toUpperCase().includes(q)).slice(0,8);
    if (!results.length) { dd.classList.remove('open'); return; }
    dd.innerHTML = results.map(s => {
      const badge = s.signal ? `<span class="sd-badge ${s.signal.direction==='BUY'?'badge-buy':'badge-sell'}">${s.signal.direction}</span>` : '';
      return `<button class="sd-row" onclick="selectStock('${s.symbol}')">
        <div><div class="sd-sym">${s.symbol}</div><div class="sd-name">${s.name}</div></div>
        <div style="display:flex;align-items:center;gap:8px">${badge}<span class="sd-price">₹${fmt2(s.ltp)}</span></div>
      </button>`;
    }).join('');
    dd.classList.add('open');
  }

  function showDropdown() {
    const val = document.getElementById('desktop-search').value;
    if (val.trim()) handleDesktopSearch(val);
  }
  function hideDropdown() {
    document.getElementById('search-dropdown').classList.remove('open');
  }

  // ── Mobile search ──
  function handleMobileSearch(val) {
    const q = val.trim().toUpperCase();
    const res = document.getElementById('mobile-results');
    const pool = q ? window._stockData.filter(s => s.symbol.includes(q) || s.name.toUpperCase().includes(q)).slice(0,15)
                   : window._stockData.filter(s => s.signal).slice(0,15);
    res.innerHTML = pool.map(s => {
      const badge = s.signal ? `<span class="sd-badge ${s.signal.direction==='BUY'?'badge-buy':'badge-sell'}" style="font-size:11px;padding:3px 8px;">${s.signal.direction}</span>` : '';
      const chgColor = s.chgPct >= 0 ? '#00d68f' : '#ff5370';
      return `<button onclick="selectStock('${s.symbol}');closeMobileOverlay()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 12px;margin-bottom:6px;background:#161b22;border:1px solid #2a3344;border-radius:12px;cursor:pointer;text-align:left;">
        <div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#e8ecf0">${s.symbol}</div>
          <div style="font-size:12px;color:#7d8fa8;margin-top:3px">${s.name}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${badge}
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${chgColor}">${s.chgPct>=0?'+':''}${s.chgPct.toFixed(2)}%</span>
        </div>
      </button>`;
    }).join('') || '<div style="text-align:center;color:#7d8fa8;margin-top:32px;font-size:14px">No results found</div>';
  }

  function closeMobileOverlay() {
    document.getElementById('mobile-overlay').style.display = 'none';
    document.getElementById('mobile-search-input').value = '';
  }

  // Selecting a stock — tell React via a custom event
  function selectStock(symbol) {
    document.getElementById('desktop-search').value = '';
    document.getElementById('search-dropdown').classList.remove('open');
    window.dispatchEvent(new CustomEvent('selectStock', {detail: symbol}));
    setTimeout(() => document.getElementById('detail')?.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }

  // Mobile search shows signals by default on open
  document.getElementById('mobile-search-btn')?.addEventListener('click', () => {
    handleMobileSearch('');
  });

  /* ── Theme toggle ── */
  function toggleTheme(){
    const isLight = document.body.classList.toggle('light-mode');
    document.getElementById('theme-icon').textContent = isLight ? '🌙' : '☀️';
    document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
  }

  /* ── AdSense: push static slots + inject mid-page slots after React renders ── */
  function initAds() {
    // Push all static ins elements
    document.querySelectorAll('ins.adsbygoogle:not([data-ad-status])').forEach(function(ins) {
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
    });
  }

  function injectMidPageAds() {
    const adHTML = function(id) {
      return '<div id="'+id+'" class="adsense-wrap ad-rectangle" style="margin:24px auto;max-width:1320px;padding:0 16px;text-align:center;">' +
        '<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2952795775605542" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>' +
        '</div>';
    };

    // 1. After signals section
    var signals = document.getElementById('signals');
    if (signals && !document.getElementById('ad-mid-signals')) {
      signals.insertAdjacentHTML('afterend', adHTML('ad-mid-signals'));
    }

    // 2. After stocks/watchlist section
    var stocks = document.getElementById('stocks');
    if (stocks && !document.getElementById('ad-mid-stocks')) {
      stocks.insertAdjacentHTML('afterend', adHTML('ad-mid-stocks'));
    }

    // 3. After chart/detail section
    var detail = document.getElementById('detail');
    if (detail && !document.getElementById('ad-mid-detail')) {
      detail.insertAdjacentHTML('afterend', adHTML('ad-mid-detail'));
    }

    // 4. After news section
    var news = document.getElementById('news');
    if (news && !document.getElementById('ad-mid-news')) {
      news.insertAdjacentHTML('afterend', adHTML('ad-mid-news'));
    }

    // Push all newly injected ads
    initAds();
  }

  // Run after React has painted — use MutationObserver to detect when #signals section appears
  var _adInjected = false;
  var _adObserver = new MutationObserver(function() {
    if (!_adInjected && document.getElementById('signals')) {
      _adInjected = true;
      _adObserver.disconnect();
      setTimeout(injectMidPageAds, 800); // slight delay so React fully settles
    }
  });
  _adObserver.observe(document.getElementById('root'), { childList: true, subtree: true });

  // Also init the static top/bottom ad slots on page load
  window.addEventListener('load', function() {
    initAds();
  });
</script>
